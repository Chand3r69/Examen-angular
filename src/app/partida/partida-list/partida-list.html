<p>partida-list works! - Esta es la Vista de Partidas</p>

<div class="container mt-4 text-center shadow">

  <h3 class="mb-3 fs-1">🎮 Partidas</h3>

  <a routerLink="/partidas/nueva" class="btn btn-outline-primary mb-3">
    ➕ Nueva Partida
  </a>

  <div class=" w-50 mx-auto">

    <div class="card bg-dark text-light mb-3 shadow"
      *ngFor="let p of partidas()">

      <div class="card-body d-flex justify-content-between align-items-center">

        <div class="text-start">
          <h5 class="mb-1">🪙 {{ p.puntuacion }} pts</h5>
          <small>👽 {{ getJugadorNombre(p.jugadorId) }}</small><br>
          <small>⏱️ {{ p.duracion }} min</small>
        </div>

        <div>
          <button class="btn btn-outline-info btn-sm fs-5 me-2"
            (click)="editar(p)">
            ✏️
          </button>

          <button class="btn btn-outline-danger fs-5 me-2 btn-sm"
            (click)="eliminar(p.id!)">
            🗑
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
