<p>partida-form works! - Esta es la Vista de Form de Partida</p>

<div class="container mt-5 text-center shadow">

  <h3 class="mb-4 fw-bold fs-1">
    {{ partida().id ? '✏️ Editar Partida' : '🎮 Nueva Partida' }}
  </h3>

  <div class="w-50 mx-auto text-start">

    <label class="form-label">Puntuación</label>
    <input class="form-control mb-3"
      type="number"
      [(ngModel)]="partida().puntuacion">

    <label class="form-label">Duración (minutos)</label>
    <input class="form-control mb-3"
      type="number"
      [(ngModel)]="partida().duracion">

    <label class="form-label">Fecha</label>
    <input class="form-control mb-3"
      type="date"
      [(ngModel)]="partida().fecha">

    <label class="form-label">Jugador</label>
    <select class="form-select mb-4"
      [(ngModel)]="partida().jugadorId">

      <option value="0">Seleccione jugador</option>

      <option *ngFor="let j of jugadores()" [value]="j.id">
        {{ j.nickname }}
      </option>

    </select>

    <button class="btn btn-outline-success w-100" (click)="guardar()">
      💾 Guardar
    </button>

  </div>
</div>
