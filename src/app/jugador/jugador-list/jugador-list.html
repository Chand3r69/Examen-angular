<p>jugador-list works! - Esta es la vista de Jugadores</p>


<div class="container mt-4 text-center shadow">

  <h2 class="mb-3">🦹‍♂️ Jugadores</h2>

  <a routerLink="/jugadores/nuevo" class="btn btn-outline-light mb-3">
    🚀 Nuevo Jugador
  </a>

  <table class="table table-dark table-striped table-hover w-75 mx-auto">
    <thead>
      <tr>
        <th>Nickname</th>
        <th>Nivel</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let j of jugadores()">
        <td>🍄 {{ j.nickname }}</td>
        <td>⭐ {{ j.nivel }}</td>
        <td class="d-flex justify-content-center gap-2">
          <button class="btn btn-outline-primary btn-sm me-1"
            (click)="editar(j)">
            ✏️
          </button>
          <button class="btn btn-outline-danger btn-sm fs-5 me-1"
            (click)="eliminar(j.id!)">
            🗑
          </button>


        </td>
      </tr>
    </tbody>
  </table>

</div>
